name: CI

on:
    push:
        branches:
            - master
    pull_request:
    workflow_dispatch:
        inputs:
            skip_build:
                description: 'Set to true to skip the main build and packaging job.'
                required: false
                default: false
                type: boolean
            skip_biome:
                description: 'Set to true to skip Biome checks.'
                required: false
                default: false
                type: boolean
            skip_stylelint:
                description: 'Set to true to skip Stylelint checks.'
                required: false
                default: false
                type: boolean

concurrency:
    group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        uses: ./.github/workflows/lint.yml
        with:
            skip-biome: ${{ inputs.skip_biome || false }}
            skip-stylelint: ${{ inputs.skip_stylelint || false }}

    build:
        name: Build
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.skip_build }}
        uses: ./.github/workflows/build.yml
