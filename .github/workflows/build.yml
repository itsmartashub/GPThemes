name: Build

on:
    workflow_call:

permissions:
    contents: read

jobs:
    build-and-package:
        name: Build and package
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Set up Deno
              uses: denoland/setup-deno@v2
              with:
                  deno-version: 'v2.x'

            - name: Build and package extensions
              run: pnpm build:all

            - name: Resolve short commit SHA
              id: sha
              shell: bash
              run: |
                  if [ "${{ github.event.pull_request }}" != "" ]; then
                    SHA=$(jq -r .pull_request.head.sha "$GITHUB_EVENT_PATH")
                  else
                    SHA=$GITHUB_SHA
                  fi
                  echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

            - name: Upload release archives
              uses: actions/upload-artifact@v7
              with:
                  name: ${{ github.event.pull_request.number
                      && format('GPThemes-debug-PR#{0}-{1}', github.event.pull_request.number, steps.sha.outputs.short)
                      || format('GPThemes-debug-build-{0}', steps.sha.outputs.short) }}
                  path: build/releases/*
                  if-no-files-found: error
                  retention-days: 7
