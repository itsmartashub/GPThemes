name: Lint

on:
    workflow_call:
        inputs:
            skip-biome:
                description: 'Set to true to skip Biome checks'
                required: false
                type: boolean
                default: false
            skip-stylelint:
                description: 'Set to true to skip Stylelint checks'
                required: false
                type: boolean
                default: false

permissions:
    contents: read

jobs:
    lint:
        name: Run lint checks
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Biome lint
              if: ${{ inputs.skip-biome == false }}
              run: pnpm lint

            - name: Check JavaScript import graph
              run: pnpm check:cycles

            - name: Run runtime architecture tests
              run: pnpm test:runtime

            - name: Run Stylelint
              if: ${{ inputs.skip-stylelint == false }}
              run: pnpm slint
